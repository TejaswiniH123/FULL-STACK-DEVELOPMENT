{% extends 'basicTemplate.html' %}

{% block title %}Courses{% endblock %}

{% block content %}

<h2>Course List</h2>

<table border="1">
<tr>
    <th>Code</th>
    <th>Name</th>
    <th>Credits</th>
</tr>

{% for c in course_list %}
<tr>
    <td>{{ c.coursecode }}</td>
    <td>{{ c.coursename }}</td>
    <td>{{ c.credits }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
