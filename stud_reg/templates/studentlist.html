{% extends 'basicTemplate.html' %}

{% block title %}Students{% endblock %}

{% block content %}

<h2>Student List</h2>

<table border="1">
<tr>
    <th>USN</th>
    <th>Name</th>
    <th>Sem</th>
</tr>

{% for s in student_list %}
<tr>
    <td>{{ s.usn }}</td>
    <td>{{ s.name }}</td>
    <td>{{ s.sem }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
